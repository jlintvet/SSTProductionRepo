name: Bathymetric Tile Generation

# Manual trigger only — tiles are static and rarely need regeneration.
# Re-run if: color ramp changes, CRM data updates, or a new region is added.
on:
  workflow_dispatch:
    inputs:
      region:
        description: "Region to process: mid_atlantic | ga_sc | all"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - mid_atlantic
          - ga_sc
      crm_stride:
        description: "CRM stride (1=30m max detail, 2=60m default, 3=90m fast test)"
        required: true
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"

permissions:
  contents: read   # read-only repo access — output goes to S3, not git

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-tiles:
    name: Generate and upload bathy tiles (${{ inputs.region }}, stride=${{ inputs.crm_stride }})
    runs-on: ubuntu-latest
    timeout-minutes: 240   # OPeNDAP fetch + GDAL tiling can be slow

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Install GDAL
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gdal-bin
          gdal_translate --version
          gdalinfo --version

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install netCDF4 numpy Pillow boto3

      - name: Run BathyTileGenerator.py
        env:
          REGION: ${{ inputs.region }}
          CRM_STRIDE: ${{ inputs.crm_stride }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
        run: python BathyTileGenerator.py

      - name: Tile summary
        if: always()
        run: |
          echo "CloudFront tile URL pattern:"
          echo "  https://d3qy1jhzqojgwx.cloudfront.net/bathy/{region}/{z}/{x}/{y}.png"
          echo ""
          echo "Test a tile in browser:"
          echo "  https://d3qy1jhzqojgwx.cloudfront.net/bathy/mid_atlantic/8/73/99.png"
