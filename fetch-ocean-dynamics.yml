name: Fetch Ocean Dynamics

on:
  # ── Chain off SST pipeline — run after VIIRS bundler finishes ───────────
  workflow_run:
    workflows: ["VIIRS Hourly Bundler"]
    types: [completed]

  # ── Manual trigger with optional overrides ───────────────────────────────
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD). Defaults to yesterday.'
        required: false
        default: ''
      source:
        description: 'Force a specific data source (hycom, oscar, cmems). Leave blank for auto.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch:
    name: Fetch Currents + Altimetry
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Only proceed if triggered manually OR if the upstream workflow succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests xarray netCDF4 numpy pandas copernicusmarine

      - name: Resolve target date
        id: date
        run: |
          INPUT_DATE="${{ github.event.inputs.date }}"
          if [ -z "$INPUT_DATE" ]; then
            echo "date=$(date -u -d 'yesterday' '+%Y-%m-%d')" >> $GITHUB_OUTPUT
          else
            echo "date=$INPUT_DATE" >> $GITHUB_OUTPUT
          fi

      - name: Fetch ocean dynamics data
        env:
          TARGET_DATE_OVERRIDE: ${{ steps.date.outputs.date }}
          CMEMS_USER:     ${{ secrets.CMEMS_USER }}
          CMEMS_PASSWORD: ${{ secrets.CMEMS_PASSWORD }}
          PYTHONUNBUFFERED: "1"
        run: |
          python -u fetch_ocean_dynamics.py 2>&1 | tee ocean_dynamics.log

      - name: Verify outputs exist
        run: |
          DATE="${{ steps.date.outputs.date }}"
          DSTR="${DATE//-/}"
          CURR="DailySST/Currents/currents_${DSTR}.json"
          ALT="DailySST/Altimetry/altimetry_${DSTR}_grid.json"
          MISSING=0

          if [ -f "$CURR" ]; then
            echo "Currents : $CURR ($(du -sh $CURR | cut -f1))"
            python3 -c "
          import json
          with open('$CURR') as f: d = json.load(f)
          h = d['hours'][0]
          udata = h['velocityJSON'][0]['data']
          valid = sum(1 for x in udata if x is not None)
          print(f\"  source={d['source']}  pts={valid}  maxSpeed={d['maxSpeed']} m/s\")
            "
          else
            echo "::warning::Currents output not found: $CURR"
            MISSING=$((MISSING+1))
          fi

          if [ -f "$ALT" ]; then
            echo "Altimetry: $ALT ($(du -sh $ALT | cut -f1))"
            python3 -c "
          import json
          with open('$ALT') as f: d = json.load(f)
          m = d['meta']
          print(f\"  source={m['source']}  lats={m['n_lats']}  lons={m['n_lons']}\")
            "
          else
            echo "::warning::Altimetry grid not found: $ALT"
            MISSING=$((MISSING+1))
          fi

          if [ "$MISSING" -eq 2 ]; then
            echo "::error::No output files produced — check log"
            cat ocean_dynamics.log
            exit 1
          fi

      - name: Prune files older than 7 days
        run: |
          for dir in DailySST/Currents DailySST/Altimetry; do
            [ -d "$dir" ] || continue
            find "$dir" -maxdepth 1 -name "*.json" -o -name "*.csv" | \
            grep -v "latest" | while read f; do
              # Extract date from filename (8-digit run)
              fdate=$(echo "$f" | grep -oP '\d{8}' | head -1)
              [ -z "$fdate" ] && continue
              fdate_fmt="${fdate:0:4}-${fdate:4:2}-${fdate:6:2}"
              age=$(( ( $(date -u +%s) - $(date -d "$fdate_fmt" +%s 2>/dev/null || echo 0) ) / 86400 ))
              if [ "$age" -gt 7 ]; then
                echo "Removing: $f (age ${age}d)"
                rm "$f"
              fi
            done
          done

      - name: Commit outputs to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DailySST/Currents/ DailySST/Altimetry/ || true
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "ocean: currents + altimetry ${{ steps.date.outputs.date }}"
          git push origin HEAD

      - name: Save fetch log
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p DailySST/logs
          cp ocean_dynamics.log \
             "DailySST/logs/ocean_dynamics_${{ steps.date.outputs.date }}.log"
          git add "DailySST/logs/ocean_dynamics_${{ steps.date.outputs.date }}.log"
          git diff --cached --quiet && echo "No log changes" || \
            git commit -m "ocean: log ${{ steps.date.outputs.date }}"
          git push origin HEAD
