<svg viewBox="0 0 520 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ibg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0d2070"/>
      <stop offset="55%"  stop-color="#0858c8"/>
      <stop offset="100%" stop-color="#0888e0"/>
    </linearGradient>
    <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#00a8e8"/>
      <stop offset="100%" stop-color="#00e8ff"/>
    </linearGradient>
    <clipPath id="ic">
      <rect width="80" height="80" rx="14"/>
    </clipPath>
  </defs>

  <!-- ── Icon ── -->
  <rect width="80" height="80" rx="14" fill="url(#ibg)"/>
  <!-- Topo lines -->
  <g clip-path="url(#ic)" fill="none" stroke="#70b0ff" stroke-width="0.6" opacity="0.18">
    <ellipse cx="62" cy="20" rx="18" ry="10"/>
    <ellipse cx="62" cy="20" rx="30" ry="18"/>
    <ellipse cx="62" cy="20" rx="44" ry="28"/>
    <ellipse cx="62" cy="20" rx="58" ry="38"/>
  </g>
  <!-- R mark -->
  <g transform="translate(2,0) skewX(-10)" clip-path="url(#ic)">
    <path fill="white" fill-rule="evenodd" d="
      M 14 72  L 14 10  L 52 10
      C 70 10 72 24 72 30  C 72 40 66 46 52 47
      L 45 43  L 64 72  L 54 72  L 37 44  L 23 44  L 23 72 Z
      M 23 17  L 23 38  C 23 38 44 40 51 36  C 60 31 60 18 51 17 Z
      M 39 44  L 54 46  L 45 43 Z
    "/>
  </g>
  <!-- Wave -->
  <g clip-path="url(#ic)">
    <path fill="url(#wg)" d="
      M 10 63  C 20 55 32 60 40 54  C 48 48 56 54 68 48
      L 70 54  C 58 60 50 54 42 60  C 34 66 22 61 12 69 Z
    "/>
  </g>

  <!-- ── RIPLOC wordmark ── -->
  <!-- Bold condensed italic letters, approximated with text + bold weight -->
  <text x="96" y="50"
    font-family="'Arial Black','Impact',sans-serif"
    font-weight="900" font-style="italic" font-size="42"
    fill="white" letter-spacing="-1">RIPLOC</text>

  <!-- ── OFFSHORE FISHING INTELLIGENCE ── -->
  <text x="97" y="66"
    font-family="'Arial','Helvetica',sans-serif"
    font-weight="700" font-size="11" fill="#00c8e8"
    letter-spacing="2.5">OFFSHORE FISHING INTELLIGENCE</text>

</svg>